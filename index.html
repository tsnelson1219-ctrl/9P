<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>九宮飛星 - 二十四山專業版</title>
    <style>
        :root {
            --bg: #0f0e0c; --gold: #f5c767; --green: #5cd0aa; --red: #ff5757;
            --text: #ffffff; --water: #6eb5f9; --metal: #e6e6e6; --earth: #cca45e;
            --border: rgba(245, 199, 103, 0.8);
            --panel-bg: rgba(15, 14, 12, 0.85);
            /* 大幅降低圓盤底色不透明度，確保重疊對照清楚 */
            --ring-bg: rgba(15, 14, 12, 0.4); 
            --text-glow: 0px 0px 5px rgba(0,0,0,0.9);
            --info-bg: rgba(255, 255, 255, 0.05);
        }
        body.light-mode {
            --bg: #f4ebd8; --gold: #b38531; --green: #1a8a63; --red: #d12828;
            --text: #111111; --water: #1d6aa3; --metal: #444444; --earth: #8a652e;
            --border: rgba(179, 133, 49, 0.8);
            --panel-bg: rgba(244, 235, 216, 0.85);
            --ring-bg: rgba(244, 235, 216, 0.4);
            --text-glow: 0px 0px 5px rgba(255,255,255,0.9);
            --info-bg: rgba(0, 0, 0, 0.05);
        }
        body { background-color: var(--bg); color: var(--text); font-family: "PingFang TC", "Microsoft JhengHei", monospace; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        .top-nav { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 12px; padding: 12px; background: var(--panel-bg); border-bottom: 1px solid var(--border); z-index: 100; }
        .nav-group { display: flex; gap: 8px; align-items: center; }
        .info-display { background: var(--info-bg); border: 1px solid var(--gold); border-radius: 6px; padding: 6px 12px; font-size: 14px; color: var(--gold); min-width: 80px; text-align: center; font-weight: bold; }
        .btn { background: transparent; color: var(--gold); border: 1px solid var(--gold); padding: 8px 14px; cursor: pointer; border-radius: 6px; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
        .year-input { background: transparent; border: 1px solid var(--gold); border-radius: 6px; color: var(--gold); text-align: center; font-size: 15px; width: 65px; padding: 6px; outline: none; }
        
        .workspace { position: relative; flex: 1; width: 100vw; overflow: hidden; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #floorPlan { position: absolute; left: 50%; top: 50%; transform-origin: center center; transition: opacity 0.3s; pointer-events: none; opacity: 0.6; }
        #compassSvg { position: absolute; width: 90vmin; height: 90vmin; max-width: 820px; max-height: 820px; pointer-events: none; transition: opacity 0.3s, transform 0.05s linear; overflow: visible; transform-origin: center center; transform: translateY(-2vh); opacity: 1; }
        
        .theme-toggle-container { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 100; }
        .theme-toggle { width: 45px; height: 45px; border-radius: 50%; border: 1px solid var(--gold); background: var(--panel-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        #fileInput { display: none; }
    </style>
</head>
<body>

<div class="top-nav">
    <div class="nav-group">
        <span style="color:var(--gold); font-size:12px;">年份</span>
        <input type="number" id="yearInput" class="year-input" value="2026" onchange="renderCompass()">
        <span id="periodLabel" style="color:var(--gold); font-size:13px; font-weight:bold; margin-left:5px;"></span>
    </div>
    <div class="nav-group">
        <div id="degDisplay" class="info-display">0°</div>
        <div id="mountainDisplay" class="info-display">子山午向</div>
    </div>
    <div class="nav-group">
        <button class="btn" onclick="document.getElementById('fileInput').click()">上傳底圖</button>
        <button class="btn btn-danger" style="border-color:var(--red); color:var(--red);" onclick="clearMap()">清除</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">
</div>

<div class="workspace" id="workspace">
    <img id="floorPlan" src="" style="display:none;" draggable="false">
    <svg id="compassSvg" viewBox="-50 -150 700 850">
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>

        <g id="outerRingGroup" transform="rotate(0, 300, 300)">
            <g id="outerRingLayer"></g>
        </g>

        <g id="compassGroup" transform="rotate(0, 300, 300)">
            <circle cx="300" cy="300" r="250" fill="transparent" stroke="var(--gold)" stroke-width="1.5" stroke-dasharray="2,4"/>
            <circle cx="300" cy="300" r="215" fill="transparent" stroke="var(--border)" stroke-width="1"/>
            <circle cx="300" cy="300" r="80" fill="transparent" stroke="var(--border)" stroke-width="2"/>
            <g id="sectorsLayer" style="text-shadow: var(--text-glow);"></g>
        </g>

        <circle id="northResetBtn" cx="300" cy="-110" r="16" fill="var(--red)" filter="url(#glow)" style="cursor: pointer; pointer-events: auto;" onpointerdown="resetCompass(event)"/>
    </svg>
</div>

<div class="theme-toggle-container">
    <button class="theme-toggle" onclick="document.body.classList.toggle('light-mode'); renderCompass()">◑</button>
</div>

<script>
    const twentyFourMountains = ["子", "壬", "亥", "乾", "戌", "辛", "酉", "庚", "申", "坤", "未", "丁", "午", "丙", "巳", "巽", "辰", "乙", "卯", "甲", "寅", "艮", "丑", "癸"];
    const stars = [
        { n: 1, name: "一白水", c: "var(--water)", positive: "名聲官位", negative: "憂鬱孤獨" },
        { n: 2, name: "二黑土", c: "var(--earth)", positive: "財富田產", negative: "病符健康" },
        { n: 3, name: "三碧木", c: "var(--green)", positive: "競爭活力", negative: "是非官訟" },
        { n: 4, name: "四綠木", c: "var(--green)", positive: "文昌桃花", negative: "酒色風波" },
        { n: 5, name: "五黃土", c: "var(--earth)", positive: "帝王威權", negative: "災禍血光" },
        { n: 6, name: "六白金", c: "var(--metal)", positive: "驛馬權柄", negative: "官非孤獨" },
        { n: 7, name: "七赤金", c: "var(--metal)", positive: "權威口才", negative: "小人是非" },
        { n: 8, name: "八白土", c: "var(--earth)", positive: "財富吉慶", negative: "財運退守" },
        { n: 9, name: "九紫火", c: "var(--red)", positive: "喜慶升遷", negative: "火燥精神" }
    ];
    const dirs = ["正北", "東北", "正東", "東南", "正南", "西南", "正西", "西北"];
    const offsets = [5, 3, 7, 8, 4, 6, 2, 1];
    
    let state = { mode: 'compass', compassRot: 0, outerRot: 0, map: { x: 0, y: 0, scale: 1, rot: 0 }, isDragging: false, isClick: false, pointers: [] };

    const mountainColors = {
        "子":"var(--gold)","丑":"var(--gold)","寅":"var(--gold)","卯":"var(--gold)","辰":"var(--gold)","巳":"var(--gold)",
        "午":"var(--gold)","未":"var(--gold)","申":"var(--gold)","酉":"var(--gold)","戌":"var(--gold)","亥":"var(--gold)",
        "艮":"var(--green)","巽":"var(--green)","坤":"var(--green)","乾":"var(--green)",
        "甲":"var(--metal)","乙":"var(--metal)","丙":"var(--metal)","丁":"var(--metal)",
        "庚":"var(--metal)","辛":"var(--metal)","壬":"var(--metal)","癸":"var(--metal)"
    };

    function renderOuterRing() {
        const layer = document.getElementById('outerRingLayer');
        const innerR = 265, outerR = 345, labelR = 305;
        let html = `<circle cx="300" cy="300" r="${outerR}" fill="var(--ring-bg)" stroke="var(--gold)" stroke-width="2"/><circle cx="300" cy="300" r="${innerR}" fill="transparent" stroke="var(--gold)" stroke-width="1"/>`;
        for (let i = 0; i < 24; i++) {
            const angleDeg = i * 15;
            const rad = (angleDeg - 7.5) * Math.PI / 180;
            html += `<line x1="${300 + innerR * Math.sin(rad)}" y1="${300 - innerR * Math.cos(rad)}" x2="${300 + outerR * Math.sin(rad)}" y2="${300 - outerR * Math.cos(rad)}" stroke="var(--border)" stroke-width="0.8"/>`;
            const name = twentyFourMountains[i];
            const tx = 300 + labelR * Math.sin(angleDeg * Math.PI / 180), ty = 300 - labelR * Math.cos(angleDeg * Math.PI / 180);
            html += `<text x="${tx}" y="${ty}" fill="${mountainColors[name]}" font-size="18" text-anchor="middle" dominant-baseline="middle" font-weight="bold" transform="rotate(${angleDeg}, ${tx}, ${ty})">${name}</text>`;
        }
        layer.innerHTML = html;
    }

    function updateMountainDisplay() {
        let deg = ((-Math.round(state.outerRot) % 360) + 360) % 360;
        let facingIndex = (Math.round(-state.outerRot / 15) % 24 + 24) % 24;
        let sittingIndex = (facingIndex + 12) % 24;
        document.getElementById('degDisplay').innerText = `${deg}°`;
        document.getElementById('mountainDisplay').innerText = `${twentyFourMountains[sittingIndex]}山${twentyFourMountains[facingIndex]}向`;
    }

    function toggleView() {
        state.mode = state.mode === 'compass' ? 'map' : 'compass';
        const compass = document.getElementById('compassSvg');
        const map = document.getElementById('floorPlan');
        // 切換透明度配比，讓對照更清楚
        if (state.mode === 'map') {
            compass.style.opacity = "0.2"; map.style.opacity = "1";
        } else {
            compass.style.opacity = "0.8"; map.style.opacity = "0.6";
        }
        renderCompass();
    }

    window.resetCompass = function(e) {
        e.stopPropagation();
        state.compassRot = 0; document.getElementById('compassGroup').setAttribute('transform', `rotate(0, 300, 300)`);
        state.outerRot = 0; document.getElementById('outerRingGroup').setAttribute('transform', `rotate(0, 300, 300)`);
        updateMountainDisplay();
    };

    function renderCompass() {
        renderOuterRing();
        const year = parseInt(document.getElementById('yearInput').value) || 2026;
        let info = (function(y){
            let offset = ((y - 1864) % 180 + 180) % 180;
            let period = Math.floor(offset / 20) + 1;
            let cycle = period <= 3 ? "上元" : period <= 6 ? "中元" : "下元";
            return { period, label: `${cycle}${["","一","二","三","四","五","六","七","八","九"][period]}運` };
        })(year);
        document.getElementById('periodLabel').innerText = `(${info.label})`;
        let centerStar = (10 - ((year - 1900) % 9)) % 9 || 9;
        const layer = document.getElementById('sectorsLayer'); layer.innerHTML = '';
        const cS = stars[centerStar - 1];
        layer.innerHTML += `<text x="300" y="285" fill="${cS.c}" font-size="42" text-anchor="middle" font-weight="bold">${cS.n}</text><text x="300" y="315" fill="${cS.c}" font-size="18" text-anchor="middle">${cS.name}</text>`;
        layer.innerHTML += `<rect id="centerBtn" x="255" y="335" width="90" height="26" rx="13" fill="var(--panel-bg)" stroke="var(--gold)" opacity="0.6" style="cursor:pointer; pointer-events:all;"/>`;
        layer.innerHTML += `<text x="300" y="353" fill="var(--gold)" font-size="14" text-anchor="middle" font-weight="bold" style="pointer-events:none;">${state.mode === 'compass' ? '切換底圖' : '切換圓盤'}</text>`;

        for (let i = 0; i < 8; i++) {
            let angle = i * 45, rad = (angle - 22.5) * Math.PI / 180;
            layer.innerHTML += `<line x1="${300+80*Math.sin(rad)}" y1="${300-80*Math.cos(rad)}" x2="${300+250*Math.sin(rad)}" y2="${300-250*Math.cos(rad)}" stroke="var(--border)" stroke-width="1.5"/>`;
            let starNum = (centerStar + offsets[i] - 1) % 9 + 1;
            const sD = stars[starNum - 1], diff = (starNum - info.period + 9) % 9;
            let status = ["當旺","生氣","進氣","死氣","死氣","煞氣","煞氣","衰氣","退氣"][diff];
            if(starNum === 5) status = "大煞";
            let isDanger = (status==="大煞"||status==="煞氣");
            layer.innerHTML += `<g transform="rotate(${angle}, 300, 300)">
                <text x="300" y="68" fill="${isDanger?'var(--red)':'var(--gold)'}" font-size="11" text-anchor="middle">[ ${status} - ${isDanger?sD.negative:sD.positive} ]</text>
                <text x="300" y="115" fill="var(--gold)" font-size="15" text-anchor="middle" font-weight="bold">${dirs[i]}</text>
                <text x="300" y="172" fill="${sD.c}" font-size="52" text-anchor="middle" font-weight="bold">${sD.n}</text>
                <text x="300" y="208" fill="${sD.c}" font-size="17" text-anchor="middle" font-weight="bold">${sD.name}</text>
            </g>`;
        }
    }

    const ws = document.getElementById('workspace'), svg = document.getElementById('compassSvg');
    
    ws.addEventListener('pointerdown', e => {
        ws.setPointerCapture(e.pointerId);
        state.pointers.push(e);
        state.isDragging = true;
        state.isClick = (state.pointers.length === 1);

        const rect = ws.getBoundingClientRect(), cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;
        
        const pt = svg.createSVGPoint(); pt.x = e.clientX; pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        state.downDist = Math.hypot(svgP.x - 300, svgP.y - 300);

        if (state.mode === 'compass') {
            state.dragTarget = state.downDist > 255 ? 'outer' : 'inner';
            state.startAngle = currentAngle;
            state.initialRot = (state.dragTarget === 'outer' ? state.outerRot : state.compassRot);
        } else {
            if (state.pointers.length === 1) {
                state.lastX = e.clientX; state.lastY = e.clientY;
                state.startAngle = currentAngle; // 用於電腦端 Shift+旋轉
                state.initialMapRot = state.map.rot;
            } else if (state.pointers.length === 2) {
                state.pinchDist = Math.hypot(state.pointers[1].clientX - state.pointers[0].clientX, state.pointers[1].clientY - state.pointers[0].clientY);
                state.pinchAngle = Math.atan2(state.pointers[1].clientY - state.pointers[0].clientY, state.pointers[1].clientX - state.pointers[0].clientX) * 180 / Math.PI;
                state.initialMapScale = state.map.scale;
                state.initialMapRot = state.map.rot;
            }
        }
    });

    ws.addEventListener('pointermove', e => {
        if (!state.isDragging) return;
        const index = state.pointers.findIndex(p => p.pointerId === e.pointerId);
        if (index !== -1) state.pointers[index] = e;
        state.isClick = false;

        const rect = ws.getBoundingClientRect(), cx = rect.left + rect.width / 2, cy = rect.top + rect.height / 2;
        const currentAngle = Math.atan2(e.clientY - cy, e.clientX - cx) * 180 / Math.PI;

        if (state.mode === 'compass') {
            if (state.pointers.length === 1) {
                let delta = currentAngle - state.startAngle;
                if (state.dragTarget === 'outer') {
                    state.outerRot = state.initialRot + delta;
                    document.getElementById('outerRingGroup').setAttribute('transform', `rotate(${state.outerRot}, 300, 300)`);
                    updateMountainDisplay();
                } else {
                    state.compassRot = state.initialRot + delta;
                    document.getElementById('compassGroup').setAttribute('transform', `rotate(${state.compassRot}, 300, 300)`);
                }
            }
        } else {
            if (state.pointers.length === 1) {
                // 電腦端操作優化：Shift + 拖拽 = 旋轉底圖
                if (e.shiftKey) {
                    let delta = currentAngle - state.startAngle;
                    state.map.rot = state.initialMapRot + delta;
                } else {
                    state.map.x += (e.clientX - state.lastX);
                    state.map.y += (e.clientY - state.lastY);
                }
                state.lastX = e.clientX; state.lastY = e.clientY;
            } else if (state.pointers.length === 2) {
                const dist = Math.hypot(state.pointers[1].clientX - state.pointers[0].clientX, state.pointers[1].clientY - state.pointers[0].clientY);
                const angle = Math.atan2(state.pointers[1].clientY - state.pointers[0].clientY, state.pointers[1].clientX - state.pointers[0].clientX) * 180 / Math.PI;
                state.map.scale = state.initialMapScale * (dist / state.pinchDist);
                state.map.rot = state.initialMapRot + (angle - state.pinchAngle);
            }
            updateMap();
        }
    });

    ws.addEventListener('pointerup', e => {
        if (state.isClick && state.downDist < 80) toggleView();
        state.pointers = state.pointers.filter(p => p.pointerId !== e.pointerId);
        if (state.pointers.length === 0) state.isDragging = false;
        else if (state.pointers.length === 1) {
            state.lastX = state.pointers[0].clientX; state.lastY = state.pointers[0].clientY;
        }
    });

    ws.addEventListener('wheel', e => {
        if (state.mode === 'map') {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.9 : 1.1;
            state.map.scale *= delta;
            updateMap();
        }
    }, { passive: false });

    function handleImage(e) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            const img = document.getElementById('floorPlan');
            img.onload = function() {
                const wsRect = ws.getBoundingClientRect();
                state.map.scale = Math.min(wsRect.width / img.naturalWidth, wsRect.height / img.naturalHeight) * 0.95;
                state.map.x = 0; state.map.y = 0; state.map.rot = 0; updateMap();
                img.style.display = 'block'; toggleView();
            };
            img.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    }
    function clearMap() { const img = document.getElementById('floorPlan'); img.src = ''; img.style.display = 'none'; }
    function updateMap() { 
        document.getElementById('floorPlan').style.transform = `translate(calc(-50% + ${state.map.x}px), calc(-50% + ${state.map.y}px)) scale(${state.map.scale}) rotate(${state.map.rot}deg)`; 
    }

    renderCompass();
    updateMountainDisplay();
</script>
</body>
</html>
